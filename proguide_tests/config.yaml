app:
  name: Frontend App
  type: frontend
  framework: auto
  start_command: auto
  base_url: auto
  ready_timeout_seconds: 60
runner:
  browser: chromium
  parallel_workers: auto
  video: 'on'
  screenshots: on_failure
  traces: retain_on_failure
llm:
  provider: anthropic
  model: claude-sonnet-4-6
  temperature: 0.2
  max_cases: 12
  max_context_chars: 50000
  max_output_tokens: 8000
